<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ບັນຊີສ່ວນຕົວ / บัญชีส่วนตัว</title>

    <!-- Google Fonts — Noto Sans Lao (fallback ถ้าไม่มี Saysettha/Phetsarath) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        /* ลาว: Saysettha OT → Phetsarath OT → Noto Sans Lao */
        /* อังกฤษ/ตัวเลข: Times New Roman */
        font-family: 'Saysettha OT', 'Phetsarath OT',
                     'Noto Sans Lao', 'Noto Sans Thai',
                     'Times New Roman', Times, serif;
      }

      /* ตัวเลขและข้อความภาษาอังกฤษใช้ Times New Roman */
      input, button, select, textarea {
        font-family: 'Saysettha OT', 'Phetsarath OT',
                     'Noto Sans Lao', 'Noto Sans Thai',
                     'Times New Roman', Times, serif;
      }

      /* ─── Print / PDF ─────────────────────────────── */
      @media print {
        /* ซ่อนทุกอย่าง */
        body * {
          visibility: hidden !important;
        }

        /* แสดงเฉพาะ report card */
        #report-print,
        #report-print * {
          visibility: visible !important;
        }

        #report-print {
          position: fixed !important;
          top: 0 !important;
          left: 0 !important;
          width: 100% !important;
          padding: 20px !important;
          background: white !important;
          font-family: 'Saysettha OT', 'Phetsarath OT',
                       'Noto Sans Lao', 'Times New Roman',
                       serif !important;
        }

        @page {
          margin: 10mm;
          size: A4;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
